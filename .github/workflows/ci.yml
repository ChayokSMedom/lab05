name: CI for Lab05

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Клонирует submodule рекурсивно

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Update submodules
        run: |
          git submodule update --init --recursive
          ls -la third-party/gtest/  # Для отладки - посмотрим, что внутри

      - name: Configure CMake with tests
        run: cmake -H. -B_build -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build _build

      - name: Run tests
        run: |
          cd _build
          ctest --output-on-failure
